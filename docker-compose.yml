services:
  postgres:
    image: postgres:16-alpine
    container_name: teamsphere-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: teamsphere
      POSTGRES_PASSWORD: teamsphere_dev_password
      POSTGRES_DB: teamsphere_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: teamsphere-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
